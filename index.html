<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تولدت مبارک - جادوی راپونزل</title>
    <style>
        /* تنظیمات پایه */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #020111;
            overflow: hidden; font-family: Tahoma, sans-serif;
            position: fixed; 
            touch-action: none; 
        }

        /* بوم نقاشی برای ستاره‌ها */
        #starfield {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 60%; z-index: 1;
        }

        /* ========================================== */
        /* متن جادویی تبریک تولد */
        /* ========================================== */
        #hbd-text {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-family: 'Times New Roman', serif; /* فونت کلاسیک و شیک */
            font-size: 3.5rem;
            letter-spacing: 8px;
            font-weight: bold;
            white-space: nowrap;
            /* درخشش طلایی و گرم مثل فانوس‌ها */
            text-shadow: 0 0 20px #ff9800, 0 0 40px #ffeb3b, 0 0 80px #ffeb3b;
            
            /* تنظیمات افکت ظاهر شدن */
            opacity: 0;
            filter: blur(20px);
            transition: all 4s ease-in-out;
            
            /* قرارگیری پشت فانوس‌ها (فانوس‌ها روی 5 هستن) */
            z-index: 3; 
            pointer-events: none; /* تا مزاحم کلیک‌ها نشه */
        }

        /* کلاسی که با جاوااسکریپت اضافه میشه تا متن ظاهر بشه */
        #hbd-text.show {
            opacity: 0.85; /* یکم شفاف که واقعی‌تر باشه */
            filter: blur(0px);
            letter-spacing: 12px; /* یه باز شدن ملایم حروف */
        }

        /* ریسپانسیو برای گوشی‌های کوچیک */
        @media (max-width: 600px) {
            #hbd-text {
                font-size: 2.2rem;
                letter-spacing: 4px;
            }
            #hbd-text.show {
                letter-spacing: 6px;
            }
        }
        /* ========================================== */

        /* دریای فوق واقع‌گرایانه (Parallax Waves) */
        #sea {
            position: absolute; bottom: 0; left: 0;
            width: 100%; height: 42%; z-index: 2;
            background: linear-gradient(to bottom, #010712 0%, #031124 50%, #010408 100%);
            overflow: hidden;
            box-shadow: inset 0 15px 30px rgba(0,0,0,0.6);
        }

        .wave {
            position: absolute;
            left: 0;
            width: 200%; 
            height: 100%;
            background-repeat: repeat-x;
            background-position: 0 bottom;
            background-size: 50% 100%;
        }

        .wave1 {
            bottom: 10%;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1200 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"><path d="M0,0 C300,40 600,-40 1200,0 L1200,120 L0,120 Z" fill="%23031429" opacity="0.6"/></svg>');
            animation: moveWave 18s linear infinite;
        }

        .wave2 {
            bottom: 5%;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1200 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"><path d="M0,20 C300,-20 600,60 1200,20 L1200,120 L0,120 Z" fill="%23020e1f" opacity="0.8"/></svg>');
            animation: moveWave 12s linear infinite reverse;
        }

        .wave3 {
            bottom: -5%;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1200 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"><path d="M0,40 C300,80 600,-20 1200,40 L1200,120 L0,120 Z" fill="%23010710" opacity="1"/></svg>');
            animation: moveWave 8s linear infinite;
        }

        @keyframes moveWave {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .sea-reflection {
            position: absolute;
            top: 0; left: 50%; transform: translateX(-50%);
            width: 80%; height: 100%;
            background: radial-gradient(ellipse at top, rgba(255, 157, 0, 0.15) 0%, transparent 60%);
            z-index: 5;
            pointer-events: none;
            animation: reflectionPulse 4s infinite alternate;
        }

        @keyframes reflectionPulse {
            0% { opacity: 0.5; }
            100% { opacity: 0.9; }
        }

        /* قایق با پرسپکتیو سه‌بعدی واقعی */
        #boat-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50vh;
            perspective: 800px; 
            z-index: 10;
            display: flex;
            justify-content: center;
        }

        #boat-hull {
            position: absolute;
            bottom: -15vh;
            width: 120vw;
            max-width: 700px;
            height: 120vh;
            
            background: 
                linear-gradient(to top, rgba(0,0,0,0) 0%, rgba(0,0,0,0.98) 75%),
                repeating-linear-gradient(90deg, #2c160b 0%, #2c160b 4%, #140904 4%, #140904 4.5%);
                
            transform: rotateX(70deg);
            transform-origin: bottom center;
            
            border-radius: 50% 50% 0 0 / 25% 25% 0 0;
            
            border-left: 35px solid #3d2011;
            border-right: 35px solid #3d2011;
            border-top: 15px solid #1a0c05;
            
            box-shadow: inset 0 0 80px 30px rgba(0,0,0,0.9);
        }

        #bench {
            position: absolute;
            bottom: 10vh; 
            width: 85vw;
            max-width: 520px;
            height: 55px;
            background: linear-gradient(to bottom, #4a2815, #1f0f07);
            border-radius: 8px;
            border-top: 2px solid #734022;
            border-bottom: 8px solid #0a0402;
            box-shadow: 
                0 30px 40px rgba(0,0,0,0.95), 
                inset 0 5px 15px rgba(255, 157, 0, 0.1); 
            z-index: 11;
        }

        /* کیک سه‌بعدی با CSS */
        #cake {
            position: absolute; 
            bottom: 15vh; 
            left: 50%; 
            transform: translateX(-50%);
            width: 140px; 
            height: 60px; 
            background: linear-gradient(to right, #4a2c11, #7a461c, #4a2c11); 
            border-bottom-left-radius: 70px 20px; 
            border-bottom-right-radius: 70px 20px;
            z-index: 12; 
            box-shadow: 0 20px 30px rgba(0,0,0,0.9);
        }

        #cake::before {
            content: '';
            position: absolute;
            top: -25px; 
            left: 0;
            width: 140px;
            height: 50px;
            background: radial-gradient(ellipse at center, #fdfbf7 0%, #e3d5c8 100%); 
            border-radius: 50%;
            box-shadow: inset 0 -3px 8px rgba(0,0,0,0.1);
        }

        /* شمع */
        #candle {
            position: absolute; 
            top: -55px; 
            left: 50%; 
            transform: translateX(-50%);
            width: 12px; 
            height: 45px;
            background: linear-gradient(to right, #f4e4c1, #fff, #d3c09b);
            border-radius: 3px; 
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.2), 0 5px 15px rgba(0,0,0,0.4);
            z-index: 13;
        }

        #flame {
            position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
            width: 18px; height: 32px; background: #ff9d00;
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 20px 5px #ff9d00, 0 0 50px 15px #ff6600, 0 0 100px 30px #ffaa00;
            animation: flicker 0.15s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(0.95); opacity: 0.9; }
            100% { transform: translateX(-50%) scale(1.05); opacity: 1; }
        }

        /* فانوس‌های جادویی */
        .lantern {
            position: absolute; width: 25px; height: 35px;
            background: linear-gradient(to bottom, #ffeb3b, #ff9800);
            border-radius: 5px 5px 3px 3px; z-index: 5;
            box-shadow: 0 0 20px 5px rgba(255, 152, 0, 0.8), 0 0 40px 10px rgba(255, 235, 59, 0.4);
            animation: floatUp linear forwards;
            bottom: -50px; opacity: 0;
        }

        .lantern::after {
            content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
            width: 10px; height: 10px; background: #ff5722;
            border-radius: 50%; box-shadow: 0 0 10px #ff0000;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-120vh) scale(0.5) rotate(15deg); opacity: 0; }
        }

        /* صفحه استارت */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #fff; text-align: center;
        }

        button {
            padding: 15px 40px; font-size: 1.2rem; background: linear-gradient(45deg, #ffb347, #ff7b00);
            border: none; border-radius: 30px; color: white; cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 123, 0, 0.5); transition: 0.3s; margin-top: 20px; font-family: Tahoma;
        }
        button:hover { transform: scale(1.1); box-shadow: 0 0 30px rgba(255, 123, 0, 0.8); }

        #hint {
            position: absolute; top: 20%; width: 100%; text-align: center;
            color: rgba(255,255,255,0.8); font-size: 1.5rem; display: none; z-index: 20;
            text-shadow: 0 0 10px #fff; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <!-- صفحه شروع ساده و رازآلود -->
    <div id="overlay">
        <p style="font-size: 1.4rem; margin-bottom: 20px;">آماده‌ای برای یه سورپرایز قشنگ؟ ✨</p>
        <button id="start-btn">ورود به قایق</button>
    </div>

    <div id="hint">نزدیک میکروفون شو و شمع رو فوت کن! 🌬️</div>

    <canvas id="starfield"></canvas>
    
    <!-- متن جادویی تولد (مخفی تا قبل از فوت کردن شمع) -->
    <div id="hbd-text">HBD TINA ❤️</div>

    <div id="sea">
        <div class="wave wave1"></div>
        <div class="wave wave2"></div>
        <div class="wave wave3"></div>
        <div class="sea-reflection"></div>
    </div>

    <div id="boat-container">
        <div id="boat-hull"></div>
        <div id="bench"></div>
    </div>
    
    <div id="cake">
        <div id="candle">
            <div id="flame"></div>
        </div>
    </div>

    <audio id="music" src="music.m4a"></audio>
    <audio id="sea-sound" src="sea.mp3" loop preload="auto"></audio>

    <script>
        // --- آسمان پرستاره ---
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight * 0.6;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 1.5,
                alpha: Math.random(),
                speed: Math.random() * 0.05
            });
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
                ctx.fill();
                
                star.alpha += star.speed;
                if (star.alpha > 1 || star.alpha < 0) star.speed = -star.speed;
            });
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // --- میکروفون و صدا ---
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const hint = document.getElementById('hint');
        const flame = document.getElementById('flame');
        const music = document.getElementById('music');
        const seaSound = document.getElementById('sea-sound'); 
        
        let audioContext, analyser, microphone;
        let isBlownOut = false;

        startBtn.addEventListener('click', async () => {
            overlay.style.display = 'none';
            hint.style.display = 'block';
            
            seaSound.volume = 0.4; 
            seaSound.play().catch(e => console.log("مرورگر اجازه پخش نداد"));

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);
                analyser.fftSize = 256;
                
                detectBlow();
            } catch (err) {
                alert("برای اینکه سورپرایز کار کنه، باید تایید رو بزنی!");
            }
        });

        function detectBlow() {
            if (isBlownOut) return;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            let sum = 0;
            for (let i = 0; i < bufferLength; i++) {
                sum += dataArray[i];
            }
            let volume = sum / bufferLength;

            if (volume > 35) {
                triggerRapunzelMagic();
            } else {
                requestAnimationFrame(detectBlow);
            }
        }

        // --- اتفاقات جادویی ---
        function triggerRapunzelMagic() {
            isBlownOut = true;
            hint.style.display = 'none';
            
            flame.style.animation = 'none'; 
            flame.style.display = 'none';
            
            const candle = document.getElementById('candle');
            const smoke = document.createElement('div');
            smoke.style.position = 'absolute';
            smoke.style.top = '-28px';
            smoke.style.left = '50%';
            smoke.style.transform = 'translateX(-50%)';
            smoke.style.width = '15px';
            smoke.style.height = '15px';
            smoke.style.background = 'rgba(200, 200, 200, 0.6)'; 
            smoke.style.borderRadius = '50%';
            smoke.style.filter = 'blur(3px)'; 
            smoke.style.transition = 'all 1.5s ease-out';
            candle.appendChild(smoke);

            setTimeout(() => {
                smoke.style.top = '-80px';
                smoke.style.opacity = '0';
                smoke.style.transform = 'translateX(-50%) scale(3)';
            }, 50);
            
            music.play();
            setInterval(spawnLantern, 200); 

            // تجلی متن جادویی تولد در آسمان با ۳ ثانیه تاخیر
            setTimeout(() => {
                document.getElementById('hbd-text').classList.add('show');
            }, 3000);
        }

        function spawnLantern() {
            const lantern = document.createElement('div');
            lantern.classList.add('lantern');
            
            lantern.style.left = Math.random() * 95 + 'vw';
            const scale = Math.random() * 0.8 + 0.4;
            lantern.style.transform = `scale(${scale})`;
            
            const duration = Math.random() * 10 + 10;
            lantern.style.animationDuration = duration + 's';
            
            document.body.appendChild(lantern);
            
            setTimeout(() => {
                lantern.remove();
            }, duration * 1000);
        }
    </script>
</body>
</html>
