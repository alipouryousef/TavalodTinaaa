<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تولدت مبارک! 🌸</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* استایل جعبه کادو اولیه */
        #gift-container {
            text-align: center;
            z-index: 10;
        }

        #gift-container h2 {
            color: #d81b60;
            font-size: 2rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
        }

        .gift-box {
            font-size: 6rem;
            cursor: pointer;
            display: inline-block;
            animation: bounce 2s infinite;
            transition: transform 0.3s;
            user-select: none;
        }

        .gift-box:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .click-text {
            color: #ad1457;
            font-size: 1.2rem;
            margin-top: 15px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        /* کارت تبریک اصلی که مخفیه */
        .card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            max-width: 90%;
            width: 400px;
            display: none; /* اول کار مخفیه */
            transform: scale(0.8);
            opacity: 0;
            z-index: 10;
        }

        .card.show {
            display: block;
            animation: popUp 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        .card h1 {
            color: #d81b60;
            font-size: 2.5rem;
            margin: 0 0 15px 0;
        }

        .card p {
            color: #4a148c;
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .cake {
            font-size: 4rem;
            animation: float 3s ease-in-out infinite;
        }

        /* انیمیشن‌ها */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        @keyframes popUp {
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* قلب‌های معلق تو پس‌زمینه */
        .floating-heart {
            position: absolute;
            font-size: 1.5rem;
            bottom: -50px;
            animation: floatUp linear forwards;
            opacity: 0.8;
            z-index: 1;
        }

        @keyframes floatUp {
            to {
                transform: translateY(-120vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <!-- قسمت اول: کادو -->
    <div id="gift-container">
        <h2>یه سورپرایز برای تینا ✨</h2>
        <div class="gift-box" onclick="openGift()">🎁</div>
        <div class="click-text">بزن روی کادو! 👆</div>
    </div>

    <!-- قسمت دوم: کارت تبریک -->
    <div id="celebration-card" class="card">
        <h1>تولدت مبارک تینا! 🎀</h1>
        <p>امیدوارم امسال برات پر از اتفاقای قشنگ، خنده‌های از ته دل و روزای صورتی باشه! هرچی آرزوی خوبه مال تو... 🌸💖</p>
        <div class="cake">🎂✨</div>
    </div>

    <script>
        function openGift() {
            // مخفی کردن کادو
            document.getElementById('gift-container').style.display = 'none';
            
            // نشون دادن کارت تبریک با افکت
            const card = document.getElementById('celebration-card');
            card.classList.add('show');

            // ساختن قلب‌های معلق تو صفحه
            createHearts();
        }

        function createHearts() {
            const emojis = ['💖', '🌸', '✨', '🎀', '💕'];
            const heartCount = 40; // تعداد قلب‌ها

            for (let i = 0; i < heartCount; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('floating-heart');
                    
                    // انتخاب رندوم اموجی
                    heart.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                    
                    // موقعیت و اندازه رندوم
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDuration = (Math.random() * 3 + 3) + 's'; // بین 3 تا 6 ثانیه
                    heart.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
                    
                    document.body.appendChild(heart);
                    
                    // پاک کردن قلب بعد از اتمام انیمیشن که صفحه سنگین نشه
                    setTimeout(() => {
                        heart.remove();
                    }, 6000);
                }, i * 100); // قلب‌ها با فاصله زمانی میان بالا
            }
        }
    </script>
</body>
</html>
