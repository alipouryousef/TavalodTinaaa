<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ I See The Light ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lalezar&family=Vazirmatn:wght@300;400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #020205; /* شب تاریک راپونزل */
            font-family: 'Vazirmatn', sans-serif;
            color: #fff;
            transition: background-color 2s ease;
        }

        /* لایه اریکی و شمع جادویی */
        #room {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 170, 0, 0.15) 0%, rgba(2, 2, 5, 0.95) 60%);
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; z-index: 10; transition: opacity 2s ease;
        }

        #start-btn {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.5);
            color: #ffd700; padding: 15px 40px; font-size: 1.2rem;
            border-radius: 50px; cursor: pointer; backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            transition: all 0.3s; z-index: 100;
            font-family: 'Vazirmatn', sans-serif;
        }

        #start-btn:hover { background: rgba(255, 215, 0, 0.2); transform: scale(1.05); }

        #instruction {
            color: rgba(255, 215, 0, 0.8);
            font-size: 1.2rem; margin-bottom: 40px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            display: none; animation: pulse 2s infinite;
        }

        /* شمع الهام گرفته از گل جادویی راپونزل */
        .magic-candle-wrapper { position: relative; display: none; }
        
        .candle {
            width: 20px; height: 80px;
            background: linear-gradient(to right, #ffd700, #ffaa00);
            border-radius: 10px;
            box-shadow: inset -2px 0 10px rgba(0,0,0,0.3), 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .flame {
            position: absolute; top: -45px; left: 50%;
            width: 25px; height: 45px;
            background: linear-gradient(to bottom, #fff, #ffaa00, #ff4500);
            border-radius: 50% 0 50% 50%;
            transform-origin: bottom right;
            transform: translate(-50%, 0) rotate(45deg);
            box-shadow: 0 0 30px 10px rgba(255, 170, 0, 0.8), 0 0 60px 20px rgba(255, 100, 0, 0.4);
            transition: transform 0.1s;
        }

        .glow {
            position: absolute; top: -50px; left: 50%; transform: translateX(-50%);
            width: 100px; height: 100px;
            background: rgba(255, 170, 0, 0.15); border-radius: 50%;
            box-shadow: 0 0 150px 80px rgba(255, 170, 0, 0.4);
            animation: flicker 0.15s infinite alternate; pointer-events: none;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(0.95); opacity: 0.8; }
            100% { transform: translateX(-50%) scale(1.05); opacity: 1; }
        }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* بوم فانوس‌ها (Canvas) */
        canvas#lanterns {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0; transition: opacity 3s ease;
        }

        /* کارت تبریک طلایی راپونزل */
        #tangled-card {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -40%);
            text-align: center; opacity: 0; pointer-events: none; z-index: 20;
            transition: all 4s ease;
            width: 90%; max-width: 500px;
        }

        #tangled-card h1 {
            font-family: 'Cinzel', serif; font-size: 4rem; margin: 0;
            color: #ffd700;
            text-shadow: 0 0 20px #ffaa00, 0 0 40px #ff4500;
            letter-spacing: 5px; direction: ltr;
        }

        #tangled-card h2 {
            font-family: 'Lalezar', cursive; font-size: 2.5rem;
            color: #fff; margin-top: 10px;
            text-shadow: 0 0 15px #ffaa00;
        }

        #tangled-card p {
            font-size: 1.2rem; color: #ffe699; margin-top: 20px;
            line-height: 1.8; text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

        .sun-symbol {
            width: 60px; margin-bottom: 15px;
            filter: drop-shadow(0 0 10px #ffd700);
            animation: rotateSun 20s linear infinite;
        }

        @keyframes rotateSun { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="room">
        <button id="start-btn">برای دیدن رویات کلیک کن ✨</button>
        <div id="instruction">شمع رو فوت کن تا آسمون روشن بشه... 🌬️</div>
        
        <div class="magic-candle-wrapper" id="candle-wrapper">
            <div class="candle">
                <div class="flame" id="flame"></div>
                <div class="glow" id="glow"></div>
            </div>
        </div>
    </div>

    <!-- بوم نقاشی برای فانوس‌های راپونزل -->
    <canvas id="lanterns"></canvas>

    <div id="tangled-card">
        <!-- لوگوی نمادین خورشید راپونزل (SVG) -->
        <svg class="sun-symbol" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path fill="#ffd700" d="M50,10 C53,25 60,30 75,25 C68,35 70,42 85,45 C72,50 72,55 85,60 C70,63 68,70 75,80 C60,75 53,80 50,95 C47,80 40,75 25,80 C32,70 30,63 15,60 C28,55 28,50 15,45 C30,42 32,35 25,25 C40,30 47,25 50,10 Z M50,35 A15,15 0 1,0 50,65 A15,15 0 1,0 50,35 Z"/>
        </svg>
        <h1>T I N A</h1>
        <h2>تولدت مبارک!</h2>
        <p>امیدوارم مثل راپونزل، بالاخره به اون رویای قشنگت برسی و آسمون زندگیت همیشه پر از نور و فانوس‌های طلایی باشه... 🏮✨</p>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const room = document.getElementById('room');
        const candleWrapper = document.getElementById('candle-wrapper');
        const flame = document.getElementById('flame');
        const glow = document.getElementById('glow');
        const instruction = document.getElementById('instruction');
        const lanternsCanvas = document.getElementById('lanterns');
        const tangledCard = document.getElementById('tangled-card');
        
        let audioCtx, analyser, dataArray;
        let isBlownOut = false;

        // شروع ماجرا و دسترسی به میکروفون
        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                startBtn.style.display = 'none';
                candleWrapper.style.display = 'block';
                instruction.style.display = 'block';

                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                checkBlow();
            } catch (err) {
                alert("بدون میکروفون که نمیشه جادو کرد! 🎙️");
            }
        });

        function checkBlow() {
            if (isBlownOut) return;
            
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
            let volume = sum / dataArray.length;

            if (volume < 50) {
                let scale = Math.max(0.3, 1 - (volume / 80)); 
                let bend = 45 + (volume * 1.5); 
                flame.style.transform = `translate(-50%, 0) rotate(${bend}deg) scale(${scale})`;
                requestAnimationFrame(checkBlow);
            } else {
                startMagic();
            }
        }

        function startMagic() {
            isBlownOut = true;
            
            // خاموش شدن شمع و تاریک شدن کامل اتاق
            flame.style.display = 'none';
            glow.style.display = 'none';
            instruction.style.display = 'none';
            
            // بعد از یک ثانیه سکوت و تاریکی، صحنه راپونزل شروع میشه
            setTimeout(() => {
                room.style.opacity = '0';
                setTimeout(() => room.style.display = 'none', 2000); // حذف لایه تاریک
                
                lanternsCanvas.style.opacity = '1';
                initLanterns();
                
                // ظهور کارت تبریک طلایی
                setTimeout(() => {
                    tangledCard.style.opacity = '1';
                    tangledCard.style.transform = 'translate(-50%, -50%)';
                }, 2000);

            }, 1000);
        }

        // ==========================================
        // سیستم ذرات: فانوس‌های راپونزل (Canvas)
        // ==========================================
        const ctx = lanternsCanvas.getContext('2d');
        let width, height;
        let lanterns = [];
        const lanternCount = window.innerWidth < 600 ? 60 : 120; // تعداد فانوس‌ها

        function resize() {
            width = lanternsCanvas.width = window.innerWidth;
            height = lanternsCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Lantern {
            constructor() {
                this.x = Math.random() * width;
                this.y = height + Math.random() * 800; // شروع از پایین صفحه
                this.w = Math.random() * 12 + 15;
                this.h = this.w * 1.4;
                this.speedY = Math.random() * 1 + 0.5; // سرعت بالا رفتن
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.02 + 0.01;
                // رنگ‌های طلایی و نارنجی
                this.color = `rgba(255, ${Math.floor(Math.random()*60 + 170)}, 0, ${Math.random()*0.5 + 0.5})`;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(Math.sin(this.wobble) * 0.1); // تکان خوردن ملایم در باد
                
                // رسم بدنه فانوس
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#ff8c00';
                
                // شکل فانوس با گوشه‌های گرد
                ctx.beginPath();
                ctx.moveTo(-this.w/2, -this.h/2);
                ctx.lineTo(this.w/2, -this.h/2);
                ctx.quadraticCurveTo(this.w/2 + 2, 0, this.w/2, this.h/2);
                ctx.lineTo(-this.w/2, this.h/2);
                ctx.quadraticCurveTo(-this.w/2 - 2, 0, -this.w/2, -this.h/2);
                ctx.fill();

                // نور مرکز فانوس
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(0, this.h/4, this.w/4, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            update() {
                this.y -= this.speedY; // حرکت به بالا
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.8; // حرکت چپ و راست ملایم

                // اگر از بالای صفحه خارج شد، دوباره از پایین شروع کنه
                if (this.y < -50) {
                    this.y = height + 50;
                    this.x = Math.random() * width;
                }
            }
        }

        function initLanterns() {
            for (let i = 0; i < lanternCount; i++) {
                lanterns.push(new Lantern());
            }
            animateLanterns();
        }

        function animateLanterns() {
            requestAnimationFrame(animateLanterns);
            // پاک کردن صفحه با یه دنباله خیلی نرم (Trail effect)
            ctx.fillStyle = 'rgba(2, 2, 5, 0.3)';
            ctx.fillRect(0, 0, width, height);

            lanterns.forEach(lantern => {
                lantern.update();
                lantern.draw();
            });
        }
    </script>
</body>
</html>
