<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tangled Birthday ✨</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        #start-btn { background: #ffd700; color: #000; padding: 20px 40px; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1.5rem; }
    </style>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.150.1/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/" } }
    </script>
</head>
<body>

    <div id="ui"><button id="start-btn">سوار قایق شو 🛶</button></div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let scene, camera, renderer, cake;
        let isBlownOut = false;
        const bgMusic = new Audio('./music.m4a'); 

        // صحنه و دوربین
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.2, 0.5); // جایگاه دوربین
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // نورپردازی
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffaa00, 5);
        pointLight.position.set(0, 1, -0.5); // نور نزدیک کیک
        scene.add(pointLight);

        // لود کیک (بزرگش کردم)
        const loader = new GLTFLoader();
        loader.load('./cake.glb', (gltf) => {
            cake = gltf.scene;
            cake.scale.set(1.0, 1.0, 1.0); // مقیاس کیک رو تنظیم کن
            cake.position.set(0, 0.5, -1);
            scene.add(cake);
            camera.lookAt(cake.position); // دوربین همیشه به کیک نگاه کنه
        });

        // لود قایق
        loader.load('./boat.glb', (gltf) => {
            const boat = gltf.scene;
            boat.scale.set(0.05, 0.05, 0.05);
            boat.position.set(0, -0.5, 0);
            scene.add(boat);
        });

        // شروع و میکروفون
        document.getElementById('start-btn').addEventListener('click', async () => {
            document.getElementById('ui').style.display = 'none';
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioCtx.createAnalyser();
            audioCtx.createMediaStreamSource(stream).connect(analyser);
            analyser.fftSize = 256;
            const dataArray = new Uint8Array(analyser.frequencyBinCount);

            function checkBlow() {
                if(isBlownOut) return;
                analyser.getByteFrequencyData(dataArray);
                let volume = dataArray.reduce((a,b) => a+b) / dataArray.length;
                
                if(volume > 50) { // حساسیت فوت
                    isBlownOut = true;
                    bgMusic.play(); // موزیک اینجا پلی میشه
                    pointLight.intensity = 0; // خاموش شدن نور شمع
                    alert("تولدت مبارک تینا! 🎉");
                } else {
                    requestAnimationFrame(checkBlow);
                }
            }
            checkBlow();
        });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
