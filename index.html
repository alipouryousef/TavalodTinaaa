<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Night ✨</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      overflow:hidden;
      background:#000;
      font-family:sans-serif;
    }

    #overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.8);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      color:white;
      z-index:100;
    }

    #overlay button{
      margin-top:20px;
      padding:15px 40px;
      border:none;
      border-radius:40px;
      font-size:20px;
      cursor:pointer;
    }

    #message{
      position:fixed;
      inset:0;
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      color:white;
      font-size:40px;
      z-index:50;
    }

    #replayBtn{
      margin-top:20px;
      padding:15px 35px;
      border:none;
      border-radius:30px;
      cursor:pointer;
    }

    canvas{
      display:block;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three":"https://unpkg.com/three@0.150.1/build/three.module.js"
    }
  }
  </script>
</head>
<body>

<div id="overlay">
  <h1>✨ Birthday Night ✨</h1>
  <p>Make a wish… and blow the candles.</p>
  <button id="startBtn">Start</button>
</div>

<div id="message">
  Happy Birthday ✨
  <button id="replayBtn">Replay</button>
</div>

<script type="module" src="./script.js"></script>

</body>
</html>
