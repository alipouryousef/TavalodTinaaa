<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🛶 I See The Light ✨</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;700&display=swap');
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Vazirmatn', sans-serif;
        }

        #webgl-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; background: rgba(0, 0, 5, 0.85); transition: opacity 1.5s;
        }

        #start-btn {
            background: rgba(255, 170, 0, 0.15); border: 1px solid rgba(255, 170, 0, 0.5);
            color: #ffd700; padding: 15px 40px; font-size: 1.2rem;
            border-radius: 50px; cursor: pointer; backdrop-filter: blur(5px);
            transition: all 0.3s; font-family: 'Vazirmatn', sans-serif;
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.2);
        }

        #start-btn:hover { transform: scale(1.05); background: rgba(255, 170, 0, 0.25); }

        #instruction {
            position: absolute; top: 20%; color: rgba(255, 215, 0, 0.8);
            font-size: 1.2rem; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            opacity: 0; transition: opacity 1s; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <button id="start-btn">سوار قایق شو... 🛶</button>
    </div>
    <div id="instruction">شمع رو فوت کن تا رویاها پرواز کنن 🌬️</div>
    <div id="webgl-container"></div>
    
    <!-- حتماً یه فایل آهنگ به اسم music.mp3 تو گیت‌هابت بذار -->
    <audio id="bg-music" src="music.mp3" preload="auto"></audio>

    <script>
        // ==========================================
        // 1. تنظیمات پایه Three.js
        // ==========================================
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020208, 0.002); // مه غلیظ شبانه روی آب

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        // زاویه دید اول شخص تو قایق
        camera.position.set(0, 5, 10); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // ==========================================
        // 2. ساخت محیط (آب، ستاره‌ها، قایق و کیک) با کد خالص
        // ==========================================
        
        // نور محیطی تاریک
        const ambientLight = new THREE.AmbientLight(0x111122, 1);
        scene.add(ambientLight);

        // --- دریاچه (Water) ---
        const waterGeometry = new THREE.PlaneGeometry(1000, 1000, 50, 50);
        const waterMaterial = new THREE.MeshPhongMaterial({
            color: 0x050510, flatShading: true, shininess: 100, transparent: true, opacity: 0.9
        });
        const water = new THREE.Mesh(waterGeometry, waterMaterial);
        water.rotation.x = -Math.PI / 2;
        scene.add(water);

        // --- ستاره‌های آسمون ---
        const starsGeo = new THREE.BufferGeometry();
        const starsCount = 2000;
        const posArray = new Float32Array(starsCount * 3);
        for(let i = 0; i < starsCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 1000;
            // ستاره‌ها رو میبریم بالا تو آسمون
            if(i % 3 === 1) posArray[i] = Math.random() * 400 + 50; 
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starsMat = new THREE.PointsMaterial({ size: 1.5, color: 0xffffff, transparent: true, opacity: 0.8 });
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);

        // --- قایق (ساخت با اشکال هندسی) ---
        const boatGroup = new THREE.Group();
        const woodMaterial = new THREE.MeshPhongMaterial({ color: 0x3d2314 });
        
        // بدنه اصلی قایق جلوی دوربین
        const bowGeo = new THREE.CylinderGeometry(0.1, 4, 15, 3, 1, false, 0, Math.PI);
        const bow = new THREE.Mesh(bowGeo, woodMaterial);
        bow.rotation.x = Math.PI / 2;
        bow.rotation.z = Math.PI / 2;
        bow.position.set(0, 1, -5);
        boatGroup.add(bow);
        
        // تخته‌ای که کیک روش قرار میگیره
        const plankGeo = new THREE.BoxGeometry(4, 0.2, 1.5);
        const plank = new THREE.Mesh(plankGeo, woodMaterial);
        plank.position.set(0, 3, 3);
        boatGroup.add(plank);

        scene.add(boatGroup);

        // --- کیک و شمع ---
        const cakeGroup = new THREE.Group();
        
        // کیک
        const cakeGeo = new THREE.CylinderGeometry(1.2, 1.2, 1, 32);
        const cakeMat = new THREE.MeshPhongMaterial({ color: 0xffb6c1 }); // صورتی پاستلی
        const cakeMesh = new THREE.Mesh(cakeGeo, cakeMat);
        cakeMesh.position.y = 3.6;
        cakeGroup.add(cakeMesh);

        // شمع
        const candleGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.6);
        const candleMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
        const candleMesh = new THREE.Mesh(candleGeo, candleMat);
        candleMesh.position.y = 4.4;
        cakeGroup.add(candleMesh);

        // نور شعله شمع (باعث سایه روشن روی قایق و آب میشه)
        const flameLight = new THREE.PointLight(0xffaa00, 2, 50);
        flameLight.position.set(0, 4.8, 0);
        cakeGroup.add(flameLight);

        // گرافیک خود شعله
        const flameGeo = new THREE.ConeGeometry(0.15, 0.4, 16);
        const flameMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
        const flameMesh = new THREE.Mesh(flameGeo, flameMat);
        flameMesh.position.y = 4.8;
        cakeGroup.add(flameMesh);

        cakeGroup.position.set(0, 0, 3);
        boatGroup.add(cakeGroup); // کیک وصل میشه به قایق تا باهاش تکون بخوره

        // ==========================================
        // 3. انیمیشن دوربین (لرزش روی آب) و آب
        // ==========================================
        const clock = new THREE.Clock();
        function animateEnvironment() {
            const t = clock.getElapsedTime();
            
            // حرکت موج‌های آب
            const positions = waterGeometry.attributes.position.array;
            for(let i = 0; i < positions.length; i+=3) {
                positions[i+2] = Math.sin(positions[i]/5 + t) * Math.cos(positions[i+1]/5 + t) * 0.5;
            }
            waterGeometry.attributes.position.needsUpdate = true;

            // تکون خوردن نرم قایق و دوربین روی آب
            boatGroup.position.y = Math.sin(t * 1.5) * 0.3;
            boatGroup.rotation.z = Math.sin(t * 1) * 0.02;
            boatGroup.rotation.x = Math.cos(t * 1.2) * 0.02;
            
            camera.position.y = 5 + Math.sin(t * 1.5) * 0.3;
            
            // سوسو زدن نور شمع
            if(!isBlownOut) {
                flameLight.intensity = 2 + Math.random() * 0.5;
                flameMesh.scale.set(1 + Math.random()*0.1, 1 + Math.random()*0.2, 1);
            }
        }

        // ==========================================
        // 4. منطق فوت کردن و ساخت فانوس‌ها
        // ==========================================
        const startBtn = document.getElementById('start-btn');
        const uiLayer = document.getElementById('ui-layer');
        const instruction = document.getElementById('instruction');
        const bgMusic = document.getElementById('bg-music');
        
        let audioCtx, analyser, dataArray;
        let isBlownOut = false;
        let lanterns = [];

        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                uiLayer.style.opacity = '0';
                setTimeout(() => uiLayer.style.display = 'none', 1500);
                setTimeout(() => instruction.style.opacity = '1', 2000);

                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                checkBlow();
            } catch(e) {
                alert("بدون میکروفون که نمیشه آرزو کرد! 🎙️");
            }
        });

        function checkBlow() {
            if (isBlownOut) return;
            
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
            let volume = sum / dataArray.length;

            if (volume < 60) {
                requestAnimationFrame(checkBlow);
            } else {
                startMagic();
            }
        }

        function startMagic() {
            isBlownOut = true;
            instruction.style.opacity = '0';
            
            // خاموش شدن شمع
            flameLight.intensity = 0;
            flameMesh.visible = false;
            
            // پخش موزیک
            bgMusic.play();

            // ساخت فانوس‌ها بعد از ۲ ثانیه تاریکی
            setTimeout(() => {
                createLanterns();
            }, 2000);
        }

        function createLanterns() {
            const lanternGeo = new THREE.CylinderGeometry(0.8, 0.8, 2, 8);
            const lanternMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 }); // متریال درخشان

            for(let i = 0; i < 150; i++) {
                const mesh = new THREE.Mesh(lanternGeo, lanternMat);
                // پخش فانوس‌ها در کل دریاچه
                mesh.position.x = (Math.random() - 0.5) * 200;
                mesh.position.y = -10 - Math.random() * 50; // شروع از زیر دید دوربین
                mesh.position.z = -50 - Math.random() * 150; // جلوتر از قایق
                
                // نور اختصاصی برای هر فانوس
                const light = new THREE.PointLight(0xffaa00, 1, 20);
                mesh.add(light);

                const speed = Math.random() * 0.05 + 0.02;
                const wobbleSpeed = Math.random() * 0.02 + 0.01;
                
                lanterns.push({ mesh, speed, wobbleSpeed, wobbleOffset: Math.random() * Math.PI * 2 });
                scene.add(mesh);
            }
        }

        function animateLanterns() {
            if(lanterns.length > 0) {
                const t = clock.getElapsedTime();
                lanterns.forEach(lantern => {
                    lantern.mesh.position.y += lantern.speed;
                    lantern.mesh.position.x += Math.sin(t * lantern.wobbleSpeed + lantern.wobbleOffset) * 0.1;
                });
            }
        }

        // ==========================================
        // 5. حلقه اصلی رندر
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);
            animateEnvironment();
            animateLanterns();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
