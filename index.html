<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ I See The Light ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lalezar&family=Vazirmatn:wght@400;700&display=swap');
        
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Vazirmatn', sans-serif; user-select: none; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; pointer-events: none; transition: opacity 1s;
        }

        #start-btn {
            pointer-events: auto; background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.5); color: #ffd700;
            padding: 15px 40px; font-size: 1.5rem; font-family: 'Lalezar', cursive;
            border-radius: 50px; cursor: pointer; backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); transition: all 0.3s;
        }

        #start-btn:hover { background: rgba(255, 215, 0, 0.3); transform: scale(1.05); }

        #instruction {
            color: rgba(255, 215, 0, 0.9); font-size: 1.5rem; font-family: 'Lalezar', cursive;
            margin-top: 20px; text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
            display: none; animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        
        #loading { position: absolute; bottom: 20px; color: white; font-size: 1rem; }
    </style>

    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <div id="ui-layer">
        <button id="start-btn">سوار قایق شو 🛶</button>
        <div id="instruction">یه آرزو کن و شمع رو فوت کن... 🌬️</div>
        <div id="loading">در حال آماده‌سازی جادو... ✨</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // متغیرهای اصلی
        let scene, camera, renderer, composer;
        let boat, cake, candleLight;
        let lanterns = [];
        let audioCtx, analyser, dataArray;
        let isBlownOut = false;
        let clock = new THREE.Clock();

        const startBtn = document.getElementById('start-btn');
        const instruction = document.getElementById('instruction');
        const loadingText = document.getElementById('loading');
        
        // موزیک پس‌زمینه (بدون نیاز به پخش فضایی)
        const bgMusic = new Audio('./music.mp3');
        bgMusic.loop = true;

        init();

        function init() {
            // ۱. تنظیمات صحنه و دوربین (زاویه دید اول شخص)
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x010103, 0.03); // مه تاریک برای عمق دریاچه

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 1.5); // جایگاه چشم کاربر تو قایق

            // ۲. رندر و افکت درخشش (Bloom)
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ReinhardToneMapping;
            document.body.appendChild(renderer.domElement);

            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0;
            bloomPass.strength = 1.2; // قدرت درخشش
            bloomPass.radius = 0.5;

            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // ۳. نورپردازی داینامیک محیط
            const ambientLight = new THREE.AmbientLight(0x0a0a1a, 0.5); // نور خیلی ضعیف شب
            scene.add(ambientLight);

            candleLight = new THREE.PointLight(0xffa500, 2, 10);
            candleLight.position.set(0, 1.2, -0.5); // حدودی روی کیک
            scene.add(candleLight);

            // ۴. ساخت آب دریاچه (رفلکتیو و تاریک)
            const waterGeo = new THREE.PlaneGeometry(200, 200);
            const waterMat = new THREE.MeshStandardMaterial({ 
                color: 0x000510, roughness: 0.1, metalness: 0.8 
            });
            const water = new THREE.Mesh(waterGeo, waterMat);
            water.rotation.x = -Math.PI / 2;
            water.position.y = -0.5;
            scene.add(water);

            // ۵. ستاره‌های آسمان
            const starsGeo = new THREE.BufferGeometry();
            const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true, opacity: 0.8 });
            const starsArr = [];
            for(let i=0; i<1000; i++) {
                starsArr.push((Math.random() - 0.5) * 100, Math.random() * 50 + 5, (Math.random() - 0.5) * 100);
            }
            starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starsArr, 3));
            scene.add(new THREE.Points(starsGeo, starsMat));

            // ۶. لود کردن مدل‌های سه‌بعدی
            const loader = new GLTFLoader();
            
            // لود قایق
            loader.load('./boat.glb', (gltf) => {
                boat = gltf.scene;
                // مقیاس و موقعیت رو اینجا می‌تونی تغییر بدی اگه مدل خیلی بزرگ/کوچیک بود
                boat.scale.set(1, 1, 1); 
                boat.position.set(0, -0.5, 0);
                scene.add(boat);
                checkLoadStatus();
            }, undefined, (e) => console.error("Boat load error", e));

            // لود کیک
            loader.load('./cake.glb', (gltf) => {
                cake = gltf.scene;
                // مقیاس کیک رو تنظیم کن
                cake.scale.set(0.5, 0.5, 0.5);
                cake.position.set(0, 0.5, -1); // جلوتر از دوربین
                scene.add(cake);
                checkLoadStatus();
            }, undefined, (e) => console.error("Cake load error", e));

            let loadedCount = 0;
            function checkLoadStatus() {
                loadedCount++;
                if(loadedCount === 2) {
                    loadingText.style.display = 'none';
                }
            }

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        // منطق میکروفون و فوت کردن
        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                startBtn.style.display = 'none';
                instruction.style.display = 'block';

                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                checkBlow();
            } catch (err) {
                alert("بدون میکروفون نمی‌تونی شمع رو فوت کنی! 🎙️");
            }
        });

        function checkBlow() {
            if (isBlownOut) return;
            
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
            let volume = sum / dataArray.length;

            if (volume > 50) { // اگه محکم فوت کرد
                triggerMagic();
            } else {
                // سوسو زدن شمع با صدای محیط
                candleLight.intensity = 2 + (Math.random() * (volume / 20));
                requestAnimationFrame(checkBlow);
            }
        }

        function triggerMagic() {
            isBlownOut = true;
            instruction.style.display = 'none';
            
            // خاموش شدن شمع
            candleLight.intensity = 0;
            if(cake) cake.visible = false; // می‌تونیم کیک رو هم محو کنیم

            // پخش موزیک
            bgMusic.play();

            // ساخت فانوس‌ها
            const lanternGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.5, 8);
            const lanternMat = new THREE.MeshStandardMaterial({ 
                color: 0xffaa00, emissive: 0xffaa00, emissiveIntensity: 2 
            });

            for(let i=0; i<150; i++) {
                let l = new THREE.Mesh(lanternGeo, lanternMat);
                l.position.set(
                    (Math.random() - 0.5) * 40,
                    Math.random() * -10, // از زیر آب شروع بشن بیان بالا
                    (Math.random() - 0.5) * 40 - 10
                );
                l.userData = {
                    speed: Math.random() * 0.02 + 0.01,
                    wobble: Math.random() * Math.PI * 2
                };
                scene.add(l);
                lanterns.push(l);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        // حلقه انیمیشن
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // لرزش نرم قایق و دوربین (POV)
            camera.position.y = 1.5 + Math.sin(time * 1.5) * 0.05;
            camera.rotation.z = Math.cos(time * 1.2) * 0.02;
            camera.rotation.x = Math.sin(time * 0.8) * 0.01;

            if (!isBlownOut) {
                // سوسو زدن طبیعی شمع تو سکوت
                candleLight.position.x = Math.sin(time * 10) * 0.02;
            } else {
                // انیمیشن پرواز فانوس‌ها
                lanterns.forEach(l => {
                    l.position.y += l.userData.speed;
                    l.userData.wobble += 0.02;
                    l.position.x += Math.sin(l.userData.wobble) * 0.01;
                    l.rotation.y += 0.01;
                    l.rotation.z = Math.sin(l.userData.wobble) * 0.1;
                });
            }

            composer.render();
        }
    </script>
</body>
</html>
