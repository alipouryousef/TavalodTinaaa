<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تولدت مبارک - جادوی راپونزل</title>
    <style>
        /* تنظیمات پایه */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #020111; /* رنگ تاریک آسمان شب */
            overflow: hidden; font-family: Tahoma, sans-serif;
        }

        /* بوم نقاشی برای ستاره‌ها */
        #starfield {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 60%; z-index: 1;
        }

        /* دریا و انعکاس آب */
        #sea {
            position: absolute; bottom: 0; left: 0;
            width: 100%; height: 40%; z-index: 2;
            background: linear-gradient(to bottom, #010a15 0%, #05162b 100%);
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* امواج دریا */
        .wave {
            position: absolute; width: 200%; height: 100%;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.05) 0%, transparent 50%);
            animation: waveMotion 10s infinite linear;
        }

        @keyframes waveMotion {
            0% { transform: translateX(0) scaleY(1); }
            50% { transform: translateX(-25%) scaleY(1.2); }
            100% { transform: translateX(-50%) scaleY(1); }
        }

        /* قایق از زاویه اول شخص */
        #boat {
            position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%);
            width: 120%; max-width: 800px; height: 35vh; z-index: 10;
            background: radial-gradient(ellipse at top, #3e2723 0%, #1b0000 100%);
            border-top-left-radius: 50% 100%; border-top-right-radius: 50% 100%;
            box-shadow: inset 0 20px 50px rgba(0,0,0,0.9), 0 -10px 30px rgba(0,0,0,0.8);
            border-top: 5px solid #5d4037;
        }

        /* کیک و شمع */
        #cake {
            position: absolute; bottom: 15vh; left: 50%; transform: translateX(-50%);
            font-size: 100px; z-index: 11; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.8));
        }

        #candle {
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            width: 12px; height: 45px;
            background: linear-gradient(to right, #f4e4c1, #fff, #d3c09b);
            border-radius: 3px; box-shadow: inset 0 -5px 10px rgba(0,0,0,0.2);
        }

        #flame {
            position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
            width: 18px; height: 32px; background: #ff9d00;
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 20px 5px #ff9d00, 0 0 50px 15px #ff6600, 0 0 100px 30px #ffaa00;
            animation: flicker 0.15s infinite alternate; transition: opacity 0.3s ease;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(0.95); opacity: 0.9; }
            100% { transform: translateX(-50%) scale(1.05); opacity: 1; }
        }

        /* فانوس‌های جادویی */
        .lantern {
            position: absolute; width: 25px; height: 35px;
            background: linear-gradient(to bottom, #ffeb3b, #ff9800);
            border-radius: 5px 5px 3px 3px; z-index: 5;
            box-shadow: 0 0 20px 5px rgba(255, 152, 0, 0.8), 0 0 40px 10px rgba(255, 235, 59, 0.4);
            animation: floatUp linear forwards;
            bottom: -50px; opacity: 0;
        }

        /* افکت آتش زیر فانوس */
        .lantern::after {
            content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
            width: 10px; height: 10px; background: #ff5722;
            border-radius: 50%; box-shadow: 0 0 10px #ff0000;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-120vh) scale(0.5) rotate(15deg); opacity: 0; }
        }

        /* صفحه استارت */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #fff; text-align: center;
        }

        button {
            padding: 15px 40px; font-size: 1.2rem; background: linear-gradient(45deg, #ffb347, #ff7b00);
            border: none; border-radius: 30px; color: white; cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 123, 0, 0.5); transition: 0.3s; margin-top: 20px; font-family: Tahoma;
        }
        button:hover { transform: scale(1.1); box-shadow: 0 0 30px rgba(255, 123, 0, 0.8); }

        #hint {
            position: absolute; top: 20%; width: 100%; text-align: center;
            color: rgba(255,255,255,0.8); font-size: 1.5rem; display: none; z-index: 20;
            text-shadow: 0 0 10px #fff; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>جادوی راپونزل 🛶✨</h2>
        <p>دسترسی میکروفون رو بده و روی دکمه کلیک کن</p>
        <button id="start-btn">ورود به قایق</button>
    </div>

    <div id="hint">نزدیک میکروفون شو و شمع رو فوت کن! 🌬️</div>

    <canvas id="starfield"></canvas>

    <div id="sea">
        <div class="wave" style="left: 0; top: 20%;"></div>
        <div class="wave" style="left: -50%; top: 50%; animation-duration: 15s;"></div>
    </div>

    <div id="boat"></div>
    <div id="cake">
        🎂
        <div id="candle">
            <div id="flame"></div>
        </div>
    </div>

    <audio id="music" src="music.m4a"></audio>

    <script>
        // --- بخش 1: ساخت آسمان پرستاره با Canvas ---
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight * 0.6; // 60% بالای صفحه
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 1.5,
                alpha: Math.random(),
                speed: Math.random() * 0.05
            });
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
                ctx.fill();
                
                // چشمک زدن ستاره‌ها
                star.alpha += star.speed;
                if (star.alpha > 1 || star.alpha < 0) star.speed = -star.speed;
            });
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // --- بخش 2: منطق میکروفون و فوت کردن ---
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const hint = document.getElementById('hint');
        const flame = document.getElementById('flame');
        const music = document.getElementById('music');
        
        let audioContext, analyser, microphone;
        let isBlownOut = false;

        startBtn.addEventListener('click', async () => {
            overlay.style.display = 'none';
            hint.style.display = 'block';
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);
                analyser.fftSize = 256;
                
                detectBlow();
            } catch (err) {
                alert("برای خاموش کردن شمع، دسترسی میکروفون الزامیه!");
            }
        });

        function detectBlow() {
            if (isBlownOut) return;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            let sum = 0;
            for (let i = 0; i < bufferLength; i++) {
                sum += dataArray[i];
            }
            let volume = sum / bufferLength;

            // عدد حساسیت رو به شدت پایین آوردم (35) که با یه فوت ساده خاموش بشه
            if (volume > 35) {
                triggerRapunzelMagic();
            } else {
                requestAnimationFrame(detectBlow);
            }
        }

        // --- بخش 3: اتفاقات جادویی ---
        function triggerRapunzelMagic() {
            isBlownOut = true;
            hint.style.display = 'none';
            
            // خاموش شدن شمع با انیمیشن دود شدن
            flame.style.transform = 'scale(0)';
            flame.style.opacity = '0';
            
            music.play();
            
            // ساخت فانوس‌های جادویی
            setInterval(spawnLantern, 200); // هر 200 میلی‌ثانیه یک فانوس
        }

        function spawnLantern() {
            const lantern = document.createElement('div');
            lantern.classList.add('lantern');
            
            // موقعیت افقی رندوم
            lantern.style.left = Math.random() * 95 + 'vw';
            
            // سایز رندوم برای ایجاد حس عمق
            const scale = Math.random() * 0.8 + 0.4;
            lantern.style.transform = `scale(${scale})`;
            
            // سرعت حرکت رندوم بین 10 تا 20 ثانیه
            const duration = Math.random() * 10 + 10;
            lantern.style.animationDuration = duration + 's';
            
            document.body.appendChild(lantern);
            
            // پاکسازی رم بعد از خروج فانوس از صفحه
            setTimeout(() => {
                lantern.remove();
            }, duration * 1000);
        }
    </script>
</body>
</html>
