<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎂 Make a Wish Tina 🎂</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lalezar&family=Montserrat:wght@800&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #050505; /* شروع تو تاریکی مطلق */
            font-family: 'Montserrat', 'Lalezar', sans-serif;
            transition: background-color 1s ease;
        }

        /* لایه تاریکی و نور داینامیک شمع */
        #room {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 40%, rgba(255, 150, 50, 0.15) 0%, rgba(0,0,0,0.95) 60%);
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; z-index: 2; transition: all 1s ease;
        }

        #start-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff; padding: 15px 40px; font-size: 1.5rem;
            border-radius: 50px; cursor: pointer; backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            transition: all 0.3s; z-index: 100;
        }

        #start-btn:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.05); }

        /* راهنمای محو تو تاریکی */
        #instruction {
            position: absolute; top: 15%; color: rgba(255, 255, 255, 0.5);
            font-size: 1.2rem; font-family: 'Lalezar', cursive;
            animation: pulse 2s infinite; display: none; text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        /* کیک سه‌بعدی */
        .cake-wrapper { position: relative; display: none; margin-top: 80px; }
        
        .cake-layer {
            position: absolute; left: 50%; transform: translateX(-50%);
            border-radius: 50%;
            box-shadow: inset 0 -15px 20px rgba(0,0,0,0.4), 0 10px 15px rgba(0,0,0,0.5);
        }

        .layer-bottom { bottom: 0; width: 220px; height: 100px; background: #ff7eb3; z-index: 1; }
        .layer-top { bottom: 60px; width: 170px; height: 80px; background: #fff; z-index: 2; }
        
        /* تزیینات خامه کیک */
        .drip {
            position: absolute; top: 35px; left: 0; width: 100%; height: 30px;
            background: radial-gradient(circle at 15px 0, transparent 15px, #fff 16px) repeat-x;
            background-size: 30px 30px; z-index: 3;
        }

        /* شمع و سیستم نور */
        .candle {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            width: 14px; height: 60px;
            background: linear-gradient(to right, #e8f4f8, #bdc3c7);
            border-radius: 5px; z-index: 4;
            box-shadow: inset -2px 0 5px rgba(0,0,0,0.2);
        }

        .candle::after {
            content: ''; position: absolute; top: -5px; left: 50%; transform: translateX(-50%);
            width: 2px; height: 10px; background: #333;
        }

        /* شعله واقع‌گرایانه */
        .flame {
            position: absolute; top: -35px; left: 50%;
            width: 20px; height: 35px;
            background: linear-gradient(to bottom, #ff9d00, #ff5e00);
            border-radius: 50% 0 50% 50%; /* فرم قطره */
            transform-origin: bottom right;
            transform: translate(-50%, 0) rotate(45deg);
            box-shadow: 0 0 20px 5px rgba(255, 150, 0, 0.6), 0 0 40px 10px rgba(255, 100, 0, 0.4);
            transition: transform 0.1s; /* برای واکنش سریع به صدا */
            z-index: 5;
        }

        .glow {
            position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
            width: 60px; height: 60px;
            background: rgba(255, 150, 0, 0.1); border-radius: 50%;
            box-shadow: 0 0 100px 50px rgba(255, 150, 0, 0.3);
            animation: flicker 0.2s infinite alternate; z-index: 4; pointer-events: none;
        }

        .smoke {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            width: 10px; height: 10px; background: rgba(200, 200, 200, 0.5);
            border-radius: 50%; filter: blur(4px); opacity: 0; z-index: 6;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(0.95); opacity: 0.8; }
            100% { transform: translateX(-50%) scale(1.05); opacity: 1; }
        }

        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
        
        @keyframes riseSmoke {
            0% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
            100% { transform: translateX(-50%) translateY(-100px) scale(4); opacity: 0; }
        }

        /* کارت نئونی بعد از روشن شدن برق */
        #neon-card {
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%) translateY(-50px);
            text-align: center; opacity: 0; pointer-events: none; z-index: 10;
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #neon-card h1 {
            font-size: 3.5rem; margin: 0; color: #fff;
            text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f, 0 0 40px #ff007f;
        }

        #neon-card p {
            font-size: 1.5rem; color: #fff; font-family: 'Lalezar', cursive;
            margin-top: 15px; text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* بوم اکلیل */
        canvas#confetti { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }

        /* استایل بعد از فوت شدن */
        body.lights-on { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); }
        body.lights-on #room { background: transparent; }
    </style>
</head>
<body>

    <div id="room">
        <button id="start-btn">ورود به اتاق تاریک 🚪</button>
        <div id="instruction">آروم فوت کن ببین چطور شعله خم میشه... بعد محکم فوتش کن! 🌬️</div>
        
        <div class="cake-wrapper" id="cake">
            <div class="candle">
                <div class="flame" id="flame"></div>
                <div class="glow" id="glow"></div>
                <div class="smoke" id="smoke"></div>
            </div>
            <div class="cake-layer layer-top">
                <div class="drip"></div>
            </div>
            <div class="cake-layer layer-bottom"></div>
        </div>
    </div>

    <div id="neon-card">
        <h1>T I N A</h1>
        <p>🎉 تولدت مبارکککک! 🎉</p>
    </div>

    <canvas id="confetti"></canvas>

    <script>
        const startBtn = document.getElementById('start-btn');
        const cake = document.getElementById('cake');
        const flame = document.getElementById('flame');
        const glow = document.getElementById('glow');
        const smoke = document.getElementById('smoke');
        const instruction = document.getElementById('instruction');
        const neonCard = document.getElementById('neon-card');
        let audioCtx, analyser, dataArray;
        let isBlownOut = false;

        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                startBtn.style.display = 'none';
                cake.style.display = 'block';
                instruction.style.display = 'block';

                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                checkBlow();
            } catch (err) {
                alert("بدون میکروفون که نمیشه شمع رو فوت کرد! 🎙️");
            }
        });

        // منطق فیزیک شعله با صدا
        function checkBlow() {
            if (isBlownOut) return;
            
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
            let volume = sum / dataArray.length;

            // فیزیک داینامیک: شعله با صدای کم خم میشه و با صدای زیاد خاموش میشه
            if (volume < 50) {
                // مپ کردن ولوم به زاویه و مقیاس شعله (تغییر سایز داینامیک)
                let scale = Math.max(0.4, 1 - (volume / 80)); 
                let bend = 45 + (volume * 1.5); // هرچی ولوم بیشتر، خمیدگی بیشتر
                flame.style.transform = `translate(-50%, 0) rotate(${bend}deg) scale(${scale})`;
                requestAnimationFrame(checkBlow);
            } else {
                // فوت محکم!
                blowOut();
            }
        }

        function blowOut() {
            isBlownOut = true;
            flame.style.display = 'none';
            glow.style.display = 'none';
            instruction.style.display = 'none';
            
            // انیمیشن دود
            smoke.style.opacity = '1';
            smoke.style.animation = 'riseSmoke 2s forwards';

            // بعد از 1 ثانیه، برق‌ها روشن میشه!
            setTimeout(() => {
                document.body.classList.add('lights-on');
                neonCard.style.opacity = '1';
                neonCard.style.transform = 'translateX(-50%) translateY(0)';
                fireConfettiCannons();
            }, 1000);
        }

        // ==========================================
        // سیستم شلیک اکلیل از دو طرف صفحه
        // ==========================================
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const colors = ['#ff007f', '#00d2ff', '#ffb6c1', '#ffd700', '#7a00ff'];

        function createParticles(x, y, vxMult) {
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() * 15 + 5) * vxMult, // جهت شلیک
                    vy: (Math.random() * -20) - 5,
                    size: Math.random() * 8 + 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rot: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 15
                });
            }
        }

        function fireConfettiCannons() {
            // شلیک از چپ و راست پایین صفحه
            createParticles(0, height, 1);       // توپ چپ
            createParticles(width, height, -1);  // توپ راست
            animateConfetti();
        }

        function animateConfetti() {
            requestAnimationFrame(animateConfetti);
            ctx.clearRect(0, 0, width, height);
            
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.vy += 0.4; // جاذبه
                p.x += p.vx;
                p.y += p.vy;
                p.rot += p.rotSpeed;
                
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot * Math.PI / 180);
                ctx.fillStyle = p.color;
                if (i % 2 === 0) ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                else {
                    ctx.beginPath();
                    ctx.arc(0, 0, p.size/2, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.restore();

                // حذف ذراتی که از صفحه خارج شدن
                if (p.y > height + 50) particles.splice(i, 1);
            }
        }
    </script>
</body>
</html>
