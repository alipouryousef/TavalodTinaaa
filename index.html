<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tangled Birthday ✨</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020205; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        #start-btn { background: #ffd700; color: #000; padding: 20px 40px; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1.2rem; }
    </style>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.150.1/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/" } }
    </script>
</head>
<body>
    <div id="ui"><button id="start-btn">شروع تجربه راپونزل 🛶</button></div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let scene, camera, renderer, boat, cake;
        const bgMusic = new Audio('./music.m4a');

        // ۱. صحنه
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 2); // دوربین داخل قایق

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // ۲. نورپردازی (خیلی مهم برای اینکه سیاه نباشه)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffaa00, 1.5);
        directionalLight.position.set(0, 5, 5);
        scene.add(directionalLight);

        // ۳. ساخت ستاره‌ها
        const starGeo = new THREE.BufferGeometry();
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
        const starVertices = [];
        for(let i=0; i<2000; i++) starVertices.push((Math.random()-0.5)*200, (Math.random()-0.5)*200, (Math.random()-0.5)*200);
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
        scene.add(new THREE.Points(starGeo, starMat));

        // ۴. لود مدل‌ها
        const loader = new GLTFLoader();
        
        loader.load('./boat.glb', (gltf) => {
            boat = gltf.scene;
            boat.scale.set(0.1, 0.1, 0.1); // مقیاس رو تست کن اگه بزرگ بود تغییرش بده
            boat.position.set(0, -1, 0); 
            scene.add(boat);
        });

        loader.load('./cake.glb', (gltf) => {
            cake = gltf.scene;
            cake.scale.set(0.05, 0.05, 0.05); // کیک رو کوچک کردیم
            cake.position.set(0, 0.2, -0.5); // گذاشتیمش جلوی دوربین
            scene.add(cake);
        });

        document.getElementById('start-btn').addEventListener('click', () => {
            bgMusic.play();
            document.getElementById('ui').style.display = 'none';
        });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
