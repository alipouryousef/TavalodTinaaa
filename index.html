<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ I See The Light ✨</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; pointer-events: none; }
        #start-btn { pointer-events: auto; background: rgba(255, 215, 0, 0.2); border: 1px solid #ffd700; color: #ffd700; padding: 20px 50px; font-size: 1.5rem; border-radius: 50px; cursor: pointer; }
    </style>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.150.1/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/" } }
    </script>
</head>
<body>

    <div id="ui-layer">
        <button id="start-btn">سوار قایق شو 🛶</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let scene, camera, renderer;
        const bgMusic = new Audio('./music.m4a'); // استفاده از M4A

        // ایجاد صحنه
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 3);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(light);
        const pointLight = new THREE.PointLight(0xffaa00, 2);
        pointLight.position.set(0, 2, 0);
        scene.add(pointLight);

        const loader = new GLTFLoader();

        // لود کردن قایق
        loader.load('./boat.glb', (gltf) => {
            console.log("Boat Loaded!");
            const boat = gltf.scene;
            boat.scale.set(0.1, 0.1, 0.1); // مقیاس رو دستی آوردم پایین
            boat.position.set(0, -0.5, 0);
            scene.add(boat);
        }, undefined, (err) => console.error("Error loading boat:", err));

        // لود کردن کیک
        loader.load('./cake.glb', (gltf) => {
            console.log("Cake Loaded!");
            const cake = gltf.scene;
            cake.scale.set(0.2, 0.2, 0.2);
            cake.position.set(0, 0.5, -1);
            scene.add(cake);
        }, undefined, (err) => console.error("Error loading cake:", err));

        // شروع انیمیشن
        document.getElementById('start-btn').addEventListener('click', () => {
            bgMusic.play().catch(e => console.log("Audio play blocked", e));
            document.getElementById('ui-layer').style.display = 'none';
        });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
