<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial,sans-serif;
}

canvas{
  display:block;
}

#overlay{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
  color:white;
  z-index:100;
}

button{
  padding:15px 35px;
  border:none;
  border-radius:30px;
  font-size:20px;
  cursor:pointer;
}

#wishBtn{
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  z-index:50;
  display:none;
}
</style>
</head>

<body>

<div id="overlay">
  <h1>✨ A Special Night Awaits ✨</h1>
  <button id="startBtn">Start</button>
</div>

<button id="wishBtn">Make a Wish ✨</button>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.168.0/build/three.module.js";
import { GLTFLoader }
from "https://unpkg.com/three@0.168.0/examples/jsm/loaders/GLTFLoader.js";

const overlay=document.getElementById("overlay");
const startBtn=document.getElementById("startBtn");
const wishBtn=document.getElementById("wishBtn");

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x030712);

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,1.5,3);

const renderer=new THREE.WebGLRenderer({
  antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(
renderer.domElement
);

scene.add(
new THREE.AmbientLight(
0xffffff,
1.5
)
);

const moon=new THREE.DirectionalLight(
0xffffff,
2
);

moon.position.set(
5,
10,
5
);

scene.add(moon);



// STARS

const starGeometry =
new THREE.BufferGeometry();

const starVertices=[];

for(let i=0;i<5000;i++){

  starVertices.push(
    (Math.random()-0.5)*500,
    Math.random()*200,
    (Math.random()-0.5)*500
  );

}

starGeometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(
starVertices,
3
)
);

const starMaterial =
new THREE.PointsMaterial({
  color:0xffffff,
  size:0.5
});

const stars =
new THREE.Points(
starGeometry,
starMaterial
);

scene.add(stars);



// MODELS

const loader =
new GLTFLoader();

loader.load(
'./boat.glb',

(gltf)=>{
  scene.add(
    gltf.scene
  );
},

undefined,

(err)=>{
  console.log(
    'boat error',
    err
  );
}
);


loader.load(
'./cake.glb',

(gltf)=>{

  const cake =
  gltf.scene;

  cake.position.set(
    0,
    1,
    -1.5
  );

  cake.scale.set(
    0.6,
    0.6,
    0.6
  );

  scene.add(
    cake
  );
},

undefined,

(err)=>{
  console.log(
    'cake error',
    err
  );
}
);



// MUSIC

const music =
new Audio(
'./music.m4a'
);

music.loop=true;



// LANTERNS

const lanterns=[];

function releaseLanterns(){

  for(let i=0;i<200;i++){

    const geometry =
    new THREE.SphereGeometry(
      0.15,
      8,
      8
    );

    const material =
    new THREE.MeshBasicMaterial({
      color:0xffc94d
    });

    const lantern =
    new THREE.Mesh(
      geometry,
      material
    );

    lantern.position.set(
      (Math.random()-0.5)*20,
      Math.random()*2,
      -5-Math.random()*20
    );

    lantern.speed=
      0.01+
      Math.random()*0.03;

    scene.add(
      lantern
    );

    lanterns.push(
      lantern
    );
  }
}



// BUTTONS

startBtn.addEventListener(
'click',
()=>{

  overlay.style.display='none';
  wishBtn.style.display='block';

  music.play()
  .catch(()=>{
    console.log(
      'music blocked'
    );
  });

}
);


wishBtn.addEventListener(
'click',
()=>{

  wishBtn.innerText =
  'Happy Birthday ❤️';

  releaseLanterns();

}
);



// ANIMATION

function animate(time){

  requestAnimationFrame(
    animate
  );

  camera.position.y =
    1.5+
    Math.sin(
      time*0.001
    )*0.03;

  camera.rotation.z =
    Math.sin(
      time*0.001
    )*0.01;

  lanterns.forEach(
    l=>{
      l.position.y +=
      l.speed;
    }
  );

  renderer.render(
    scene,
    camera
  );
}

animate();

window.addEventListener(
'resize',
()=>{

  camera.aspect =
    window.innerWidth/
    window.innerHeight;

  camera.updateProjectionMatrix();

  renderer.setSize(
    window.innerWidth,
    window.innerHeight
  );

});

</script>

</body>
</html>
