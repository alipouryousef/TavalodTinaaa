<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ TINA'S UNIVERSE ✨</title>
    <!-- لود کردن Three.js برای رندر 3D و GSAP برای انیمیشن -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Vazirmatn:wght@300;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020205; /* مشکی فضایی */
            font-family: 'Vazirmatn', sans-serif;
            color: #fff;
        }

        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* لایه UI روی کهکشان */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* تا بتونه روی کهکشان تاچ کنه */
        }

        .glass-card {
            background: rgba(15, 10, 30, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 105, 180, 0.2);
            max-width: 90%;
            width: 450px;
            opacity: 0; /* برای انیمیشن GSAP */
            transform: translateY(100px) scale(0.8);
            pointer-events: auto;
        }

        h1.title {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            letter-spacing: 5px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #ff7eb3, #ff758c, #ff7eb3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 117, 140, 0.5);
            direction: ltr;
        }

        .subtitle {
            font-size: 1.5rem;
            color: #e0d4ff;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .message {
            font-size: 1.1rem;
            line-height: 1.9;
            color: #b8a5d6;
            font-weight: 300;
            text-align: justify;
            text-align-last: center;
        }

        .highlight {
            color: #ff7eb3;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255, 126, 179, 0.6);
        }

        /* افکت نویز ظریف روی کارت */
        .glass-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 30px;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.15;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- کانتینر رندر 3D -->
    <div id="webgl-container"></div>

    <!-- کانتینر UI -->
    <div id="ui-layer">
        <div class="glass-card" id="birthday-card">
            <h1 class="title">TINA</h1>
            <div class="subtitle">تولدت مبارک! 🥂</div>
            <p class="message">
                می‌گن هر آدمی تو این دنیا یه فرکانس خاص داره... 
                امیدوارم امسال فرکانس زندگیت روی <span class="highlight">بالاترین مدار خوشبختی</span> تنظیم بشه و هر روزت مثل این کهکشان، پر از نور و شگفتی باشه. 🌌✨
            </p>
        </div>
    </div>

    <script>
        // ==========================================
        // بخش اول: راه‌اندازی کهکشان 3D با Three.js
        // ==========================================
        const container = document.getElementById('webgl-container');
        
        // تنظیمات صحنه، دوربین و رندر
        const scene = new THREE.Scene();
        // اضافه کردن یه مه ملایم برای عمق دادن به تصویر
        scene.fog = new THREE.FogExp2(0x020205, 0.0015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.z = 400;
        camera.position.y = 100;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // بهینه‌سازی برای گوشی
        container.appendChild(renderer.domElement);

        // ساخت ذرات (Particles)
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 8000; // تعداد ستاره‌ها

        const posArray = new Float32Array(particlesCount * 3);
        const colorsArray = new Float32Array(particlesCount * 3);

        const color1 = new THREE.Color(0xff7eb3); // صورتی درخشان
        const color2 = new THREE.Color(0x7a00ff); // بنفش کهکشانی

        for(let i = 0; i < particlesCount * 3; i+=3) {
            // پخش کردن ذرات به شکل یک کهکشان مارپیچ/دایره‌ای
            const radius = Math.random() * 800;
            const theta = Math.random() * Math.PI * 2;
            const yOffset = (Math.random() - 0.5) * 150 * (1 - radius/800); 

            posArray[i] = Math.cos(theta) * radius;     // x
            posArray[i+1] = yOffset;                    // y
            posArray[i+2] = Math.sin(theta) * radius;   // z

            // ترکیب رنگ‌ها
            const mixedColor = color1.clone().lerp(color2, Math.random());
            colorsArray[i] = mixedColor.r;
            colorsArray[i+1] = mixedColor.g;
            colorsArray[i+2] = mixedColor.b;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));

        // متریال درخشان برای ستاره‌ها
        const particlesMaterial = new THREE.PointsMaterial({
            size: 3.5,
            vertexColors: true,
            blending: THREE.AdditiveBlending, // افکت نورانی شدن موقع روی هم افتادن
            transparent: true,
            opacity: 0.8
        });

        const particleMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particleMesh);

        // تعامل با موس و تاچ
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        // پشتیبانی از گوشی
        document.addEventListener('touchmove', (event) => {
            if (event.touches.length > 0) {
                mouseX = (event.touches[0].pageX - windowHalfX);
                mouseY = (event.touches[0].pageY - windowHalfY);
            }
        });

        // حلقه انیمیشن کهکشان
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            // چرخش نرم کل کهکشان
            particleMesh.rotation.y = elapsedTime * 0.05;
            
            // حرکت مواج و ارگانیک ذرات
            particleMesh.position.y = Math.sin(elapsedTime * 0.5) * 20;

            // تاثیر تاچ/موس روی زاویه دوربین (با تاخیر نرم)
            targetX = mouseX * 0.001;
            targetY = mouseY * 0.001;
            
            camera.position.x += (mouseX * 0.5 - camera.position.x) * 0.02;
            camera.position.y += (-mouseY * 0.5 - camera.position.y) * 0.02;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }
        animate();

        // آپدیت سایز صفحه در صورت چرخش گوشی
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==========================================
        // بخش دوم: انیمیشن سینمایی لود شدن کارت با GSAP
        // ==========================================
        window.onload = () => {
            // بعد از 1.5 ثانیه که از دیدن کهکشان لذت برد، کارت میاد بالا
            setTimeout(() => {
                gsap.to("#birthday-card", {
                    duration: 2,
                    y: 0,
                    scale: 1,
                    opacity: 1,
                    ease: "elastic.out(1, 0.75)", // یه پرش خیلی نرم و لوکس
                });
            }, 1500);
        };
    </script>
</body>
</html>
