<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tangled Birthday ✨</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#000;
    font-family:tahoma;
}

canvas{
    display:block;
}

#ui{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:10;
}

#start-btn{
    background:#ffd700;
    color:#000;
    border:none;
    padding:20px 40px;
    border-radius:50px;
    font-size:24px;
    cursor:pointer;
    box-shadow:0 0 25px rgba(255,215,0,.5);
}

#message{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:#fff;
    font-size:32px;
    text-align:center;
    display:none;
    z-index:20;
    text-shadow:0 0 20px gold;
}
</style>

<script type="importmap">
{
  "imports": {
    "three":"https://unpkg.com/three@0.150.1/build/three.module.js",
    "three/addons/":"https://unpkg.com/three@0.150.1/examples/jsm/"
  }
}
</script>
</head>

<body>

<div id="ui">
    <button id="start-btn">سوار قایق شو 🛶</button>
</div>

<div id="message">
    🎉 تولدت مبارک تینا 🎂
</div>

<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

let scene;
let camera;
let renderer;
let analyser;
let dataArray;
let pointLight;
let isBlownOut = false;

const bgMusic = new Audio("./music.m4a");
bgMusic.loop = true;

scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

// زاویه اول شخص (نشسته داخل قایق)
camera.position.set(0, 0.8, 0);

renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// نور محیط
const ambient = new THREE.AmbientLight(
    0xffffff,
    0.6
);
scene.add(ambient);

// نور شمع
pointLight = new THREE.PointLight(
    0xffaa00,
    5,
    10
);

pointLight.position.set(
    0,
    0.7,
    -0.5
);

scene.add(pointLight);

const loader = new GLTFLoader();

// قایق
loader.load(
    "./boat.glb",
    (gltf)=>{
        const boat = gltf.scene;

        boat.scale.set(
            0.05,
            0.05,
            0.05
        );

        boat.position.set(
            0,
            -0.6,
            0
        );

        scene.add(boat);
    },
    undefined,
    (err)=>{
        console.log("Boat Error", err);
    }
);

// کیک در دست کاربر
loader.load(
    "./cake.glb",
    (gltf)=>{

        const cake = gltf.scene;

        cake.scale.set(
            0.45,
            0.45,
            0.45
        );

        // کیک به دوربین متصل می‌شود
        camera.add(cake);

        // جلوی کاربر
        cake.position.set(
            0,
            -0.22,
            -0.55
        );

        cake.rotation.y = Math.PI;

        scene.add(camera);
    },
    undefined,
    (err)=>{
        console.log("Cake Error", err);
    }
);

// شروع جشن
document
.getElementById("start-btn")
.addEventListener(
    "click",
    async ()=>{

        document.getElementById("ui")
        .style.display = "none";

        try{

            const stream =
                await navigator.mediaDevices
                .getUserMedia({
                    audio:true
                });

            const audioCtx =
                new (
                    window.AudioContext ||
                    window.webkitAudioContext
                )();

            await audioCtx.resume();

            analyser =
                audioCtx.createAnalyser();

            analyser.fftSize = 256;

            const source =
                audioCtx
                .createMediaStreamSource(
                    stream
                );

            source.connect(analyser);

            dataArray =
                new Uint8Array(
                    analyser.frequencyBinCount
                );

            checkBlow();

        }catch(err){

            alert(
                "اجازه میکروفون داده نشده است."
            );

            console.log(err);
        }
    }
);

// تشخیص فوت
function checkBlow(){

    if(isBlownOut) return;

    analyser.getByteFrequencyData(
        dataArray
    );

    let volume =
        dataArray.reduce(
            (a,b)=>a+b,
            0
        ) / dataArray.length;

    if(volume > 35){

        isBlownOut = true;

        pointLight.intensity = 0;

        bgMusic.play();

        document
        .getElementById("message")
        .style.display = "block";
    }
    else{
        requestAnimationFrame(
            checkBlow
        );
    }
}

// انیمیشن
function animate(){

    requestAnimationFrame(
        animate
    );

    renderer.render(
        scene,
        camera
    );
}

animate();

// ریسپانسیو
window.addEventListener(
    "resize",
    ()=>{

        camera.aspect =
            window.innerWidth /
            window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );
    }
);
</script>

</body>
</html>
